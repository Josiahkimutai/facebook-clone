<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STONNER PLATFORM</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background-image:url("download (2).jfif");
    background-size:100% 100%;
    background-repeat:no-repeat;
    background-position:center;
}

    .overlay{
      width:100%;
      height:100vh;
      background:rgba(0,0,0,0.6);

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box{
      width:350px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(10px);

      padding:30px;
      border-radius:20px;

      text-align:center;

      box-shadow:0 8px 30px rgba(0,0,0,0.5);

      border:1px solid rgba(255,255,255,0.2);
    }

    .logo{
      width:120px;
      height:120px;
      object-fit:cover;

      border-radius:50%;

      border:4px solid white;

      margin-bottom:15px;
    }

    h2{
      color:white;
      margin-bottom:20px;
      font-size:28px;
      letter-spacing:1px;
    }

    p{
      color:#ddd;
      margin-bottom:25px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:14px;

      margin-bottom:20px;

      border:none;
      border-radius:12px;

      outline:none;

      font-size:16px;

      background:rgba(255,255,255,0.9);
    }

    button{
      width:100%;
      padding:14px;

      border:none;
      border-radius:12px;

      background:linear-gradient(45deg,#1877f2,#42a5f5);

      color:white;
      font-size:17px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      transform:scale(1.03);
      opacity:0.95;
    }

  </style>
</head>

<body>

<div class="overlay">

  <div class="box">

    <img src="Download 18 Plus Warning Sign wallpaper for your….jpg"
         class="logo">

    <h2>STONNER PLATFORM</h2>

    <p>Premium private access platform</p>

    <input type="text"
           id="phone"
           placeholder="Enter phone number (2547...)">

    <button onclick="login()">REGISTER</button>

  </div>

</div>

<script>

const API = "https://mpesa-backend-k7ly.onrender.com";

async function login() {

  const phone = document.getElementById("phone").value;

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ phone })
  });

  const data = await res.json();

  if (data.is_paid) {

    window.location.href = "home.html";

  } else {

    window.location.href = "pay.html?phone=" + phone;
  }
}

</script>

</body>
</html>
