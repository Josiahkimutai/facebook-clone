<!DOCTYPE html>
<html>
<head>
  <title>STONNER PAYMENT</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;

      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background-image:url("Saco de dinheiro realista.jpg");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    .overlay{
      width:100%;
      height:100vh;

      background:rgba(0,0,0,0.65);

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box{
      width:350px;

      background:rgba(255,255,255,0.12);

      backdrop-filter:blur(12px);

      border-radius:25px;

      padding:30px;

      text-align:center;

      border:1px solid rgba(255,255,255,0.2);

      box-shadow:0 10px 40px rgba(0,0,0,0.5);
    }

    .logo{
      width:140px;
      height:140px;

      object-fit:cover;

      border-radius:50%;

      border:4px solid white;

      margin-bottom:20px;
    }

 h2{
  color:#00ff66;

  font-size:34px;

  font-weight:bold;

  letter-spacing:2px;

  margin-bottom:15px;

  text-transform:uppercase;

  font-family:'Trebuchet MS', sans-serif;

  text-shadow:
    0 0 10px #f75910,
    0 0 20px #f55313,
    0 0 40px #eb561b;
}

    p{
      color:#ddd;
      margin-bottom:25px;
      font-size:14px;
    }

   input{
  width:100%;

  padding:14px;

  margin-bottom:18px;

  border:none;
  border-radius:12px;

  outline:none;
  color:#f3560e;

  font-size:16px;

  font-weight:bold;

  background:rgba(255,255,255,0.92);

  text-align:center;
}

    button{
      width:100%;

      padding:15px;

      border:none;
      border-radius:14px;

      background:linear-gradient(45deg,#00c853,#00e676);

      color:white;

      font-size:18px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      transform:scale(1.03);
      opacity:0.95;
    }

    .mpesa{
      margin-top:15px;
      color:#00e676;
      font-weight:bold;
      font-size:15px;
    }

  </style>
</head>

<body>

<div class="overlay">

  <div class="box">

    <img src="download (2).jfif"
         class="logo">

    <h2>PAY TO CONTINUE</h2>

    <p>Secure premium access payment system</p>

    <input id="phone"
           placeholder="Enter phone (2547...)">

    <input id="amount"
           placeholder="Amount">

    <button onclick="pay()">PAY WITH M-PESA</button>

    <div class="mpesa">
      Fast • Secure • Instant
    </div>

  </div>

</div>

<script>

const API = "https://mpesa-backend-k7ly.onrender.com";

async function pay() {

  const phone = document.getElementById("phone").value;
  const amount = document.getElementById("amount").value;

  const res = await fetch(`${API}/stkpush`, {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      phone,
      amount
    })
  });

  const data = await res.json();

  console.log(data);

  alert("STK Push sent! Check your phone 📱");
}

</script>

</body>
</html>
