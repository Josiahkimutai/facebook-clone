<!DOCTYPE html>
<html>
<head>
  <title>Feed</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f0f2f5;
    }

    .nav{
      background:#1877f2;
      color:white;
      padding:15px;
      font-size:22px;
    }

    .post-box{
      width:500px;
      margin:20px auto;
      background:white;
      padding:15px;
      border-radius:10px;
    }

    textarea{
      width:100%;
      height:80px;
    }

    .post{
      width:500px;
      margin:10px auto;
      background:white;
      padding:10px;
      border-radius:10px;
    }
  </style>

</head>

<body>

<div class="nav">Facebook Clone</div>

<div class="post-box">

  <textarea id="text"></textarea>
  <button onclick="post()">Post</button>

</div>

<div id="posts"></div>

<script type="module" src="feed.js"></script>

</body>
</html>
